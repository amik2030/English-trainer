<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - SpeakEasy AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <span class="logo">🎤</span>
                <span class="brand-name">SpeakEasy AI</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="practice.html">Practice</a></li>
                <li><a href="dashboard.html" class="active">Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <div>
                <h1>My Dashboard</h1>
                <div class="user-email" id="userEmail">Loading...</div>
            </div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalSessions">0</div>
                <div class="stat-label">Practice Sessions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalWords">0</div>
                <div class="stat-label">Words Spoken</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalMinutes">0</div>
                <div class="stat-label">Minutes Practiced</div>
            </div>
        </div>

        <!-- Conversation History -->
        <div class="section">
            <h2>Conversation History</h2>
            <div id="conversationList" class="conversation-list">
                <div class="loading">Loading conversations...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://qiapbljkhbpybhqcshjo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_pub…BayH';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function getAuthToken() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return null;
            }
            return session.access_token;
        }

        async function loadDashboard() {
            try {
                const authToken = await getAuthToken();
                if (!authToken) return;

                // Load user email
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    document.getElementById('userEmail').textContent = user.email || 'User';
                }

                // Load profile stats
                const statsResponse = await fetch('/api/progress/stats', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (statsResponse.ok) {
                    const stats = await statsResponse.json();
                    document.getElementById('totalSessions').textContent = stats.total_conversations || stats.total_sessions || 0;
                    document.getElementById('totalWords').textContent = stats.total_words || 0;
                    document.getElementById('totalMinutes').textContent = Math.round((stats.total_time || stats.total_minutes || 0) / 60);
                } else {
                    throw new Error('Failed to load stats');
                }

                // Load conversation history
                const historyResponse = await fetch('/api/progress/history', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (historyResponse.ok) {
                    const history = await historyResponse.json();
                    displayConversations(history.conversations || []);
                } else {
                    throw new Error('Failed to load history');
                }

            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('conversationList').innerHTML = `
                    <div class="error-message">Failed to load dashboard data. Please refresh the page.</div>
                `;
            }
        }

        function displayConversations(conversations) {
            const container = document.getElementById('conversationList');

            if (conversations.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <h3>No conversations yet</h3>
                        <p>Start your first practice session to see it here!</p>
                        <a href="practice.html" class="start-practice-btn">Start Practicing</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = conversations.map(conv => {
                const date = new Date(conv.start_time).toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                });

                return `
                    <div class="conversation-item">
                        <div class="conversation-info">
                            <div class="conversation-topic">${conv.topic || 'General Conversation'}</div>
                            <div class="conversation-meta">
                                ${date} • ${conv.level || 'intermediate'} level
                            </div>
                        </div>
                        <div class="conversation-stats">
                            <div class="conversation-stat">${conv.messages_count || 0} messages</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            localStorage.removeItem('sb_access_token');
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        });

        // Load dashboard on page load
        loadDashboard();
    </script>
</body>
</html>
