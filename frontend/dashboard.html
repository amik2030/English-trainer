<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - SpeakEasy AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .dashboard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-header h1 {
            margin: 0;
            font-size: 2rem;
        }

        .user-email {
            opacity: 0.9;
            font-size: 1rem;
            margin-top: 0.5rem;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }

        .stat-value {
            font-size: 3rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: #666;
            font-size: 1rem;
        }

        .section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
        }

        .section h2 {
            margin: 0 0 1.5rem 0;
            font-size: 1.5rem;
            color: #333;
        }

        .conversation-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .conversation-item {
            padding: 1.5rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .conversation-item:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
        }

        .conversation-info {
            flex: 1;
        }

        .conversation-topic {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .conversation-meta {
            color: #666;
            font-size: 0.9rem;
        }

        .conversation-stats {
            text-align: right;
        }

        .conversation-stat {
            color: #667eea;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .start-practice-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .start-practice-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .error-message {
            background: #ffe0e0;
            color: #d32f2f;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <span class="logo">🎤</span>
                <span class="brand-name">SpeakEasy AI</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="practice.html">Practice</a></li>
                <li><a href="dashboard.html" class="active">Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <div>
                <h1>My Dashboard</h1>
                <div class="user-email" id="userEmail">Loading...</div>
            </div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalSessions">0</div>
                <div class="stat-label">Practice Sessions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalWords">0</div>
                <div class="stat-label">Words Spoken</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalMinutes">0</div>
                <div class="stat-label">Minutes Practiced</div>
            </div>
        </div>

        <!-- Conversation History -->
        <div class="section">
            <h2>Conversation History</h2>
            <div id="conversationList" class="conversation-list">
                <div class="loading">Loading conversations...</div>
            </div>
        </div>
    </div>

    <script>
        // Check authentication
        const token = localStorage.getItem('sb_access_token');
        if (!token) {
            window.location.href = 'login.html';
        }

        const authToken = token;

        // Load user data
        async function loadDashboard() {
            try {
                // Load profile stats
                const statsResponse = await fetch('/api/progress/stats', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (statsResponse.ok) {
                    const stats = await statsResponse.json();
                    document.getElementById('totalSessions').textContent = stats.total_sessions || 0;
                    document.getElementById('totalWords').textContent = stats.total_words || 0;
                    document.getElementById('totalMinutes').textContent = Math.round(stats.total_minutes || 0);
                    document.getElementById('userEmail').textContent = stats.email || 'User';
                } else {
                    throw new Error('Failed to load stats');
                }

                // Load conversation history
                const historyResponse = await fetch('/api/progress/history', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (historyResponse.ok) {
                    const history = await historyResponse.json();
                    displayConversations(history.conversations || []);
                } else {
                    throw new Error('Failed to load history');
                }

            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('conversationList').innerHTML = `
                    <div class="error-message">Failed to load dashboard data. Please refresh the page.</div>
                `;
            }
        }

        function displayConversations(conversations) {
            const container = document.getElementById('conversationList');

            if (conversations.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <h3>No conversations yet</h3>
                        <p>Start your first practice session to see it here!</p>
                        <a href="practice.html" class="start-practice-btn">Start Practicing</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = conversations.map(conv => {
                const date = new Date(conv.start_time).toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                });

                return `
                    <div class="conversation-item">
                        <div class="conversation-info">
                            <div class="conversation-topic">${conv.topic || 'General Conversation'}</div>
                            <div class="conversation-meta">
                                ${date} • ${conv.level || 'intermediate'} level
                            </div>
                        </div>
                        <div class="conversation-stats">
                            <div class="conversation-stat">${conv.messages_count || 0} messages</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('sb_access_token');
            window.location.href = 'login.html';
        });

        // Load dashboard on page load
        loadDashboard();
    </script>
</body>
</html>
