<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign up for SpeakEasy AI to start your English speaking journey.">
    <title>Sign Up - SpeakEasy AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <span class="logo">🎤</span>
                <span class="brand-name">SpeakEasy AI</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="practice.html">Practice</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- Signup Section -->
    <section class="signup-section">
        <div class="signup-container">
            <div class="signup-header">
                <h1>Create Account</h1>
                <p>Start your English speaking journey</p>
            </div>

            <form class="signup-form" id="signupForm">
                <div id="errorMessage" style="display: none; background: #ffe0e0; color: #d32f2f; padding: 12px; border-radius: 8px; margin-bottom: 16px;"></div>
                <div id="successMessage" style="display: none; background: #e0ffe0; color: #2f7d2f; padding: 12px; border-radius: 8px; margin-bottom: 16px;"></div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Min 6 characters" required minlength="6">
                </div>

                <button type="button" class="signup-btn" id="signupBtn">Sign Up</button>
            </form>

            <div class="signup-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </section>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // Initialize Supabase client
        const SUPABASE_URL = 'https://qiapbljkhbpybhqcshjo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpYXBibGpraGJweWJocWNzaGpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyOTE4MDIsImV4cCI6MjA5OTg2NzgwMn0.zba_NfWkl8SpZXXzWeiEcqIH6FSZ2KUnaw94y9CNKkc';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Check if user is already logged in
        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'practice.html';
            }
        }
        checkAuth();
        
        // Signup form handler
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('signupBtn').addEventListener('click', async function(e) {
                e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('signupBtn');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            // Hide any previous messages
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            // Validate inputs
            if (!email || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }
            
            submitBtn.textContent = 'Creating account...';
            submitBtn.disabled = true;
            
            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password
                });
                
                if (error) {
                    errorDiv.textContent = 'Signup failed: ' + error.message;
                    errorDiv.style.display = 'block';
                    submitBtn.textContent = 'Sign Up';
                    submitBtn.disabled = false;
                    return;
                }
                
                // Success - redirect to dashboard
                if (data.session) {
                    localStorage.setItem('sb_access_token', data.session.access_token);
                    successDiv.textContent = 'Account created! Redirecting to practice...';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'practice.html';
                    }, 1000);
                } else if (data.user) {
                    // User created but email confirmation might be required
                    successDiv.textContent = 'Account created! Please check your email to confirm your account, then login.';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    errorDiv.textContent = 'Unexpected response. Please try again.';
                    errorDiv.style.display = 'block';
                    submitBtn.textContent = 'Sign Up';
                    submitBtn.disabled = false;
                }
            } catch (err) {
                errorDiv.textContent = 'An error occurred: ' + err.message;
                errorDiv.style.display = 'block';
                submitBtn.textContent = 'Sign Up';
                submitBtn.disabled = false;
            }
        });
        });
    </script>
</body>
</html>
