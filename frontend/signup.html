<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign up for SpeakEasy AI to start your English speaking journey.">
    <title>Sign Up - SpeakEasy AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .signup-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 60px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }
        
        .signup-container {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 50px;
            width: 100%;
            max-width: 450px;
        }
        
        .signup-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .signup-header h1 {
            font-size: 2rem;
            color: var(--text);
            margin-bottom: 10px;
        }
        
        .signup-header p {
            color: var(--text-light);
            font-size: 1rem;
        }
        
        .signup-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
        }
        
        .form-group input {
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: var(--radius);
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .signup-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 16px;
            border: none;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .signup-btn:active {
            transform: translateY(0);
        }
        
        .signup-footer {
            text-align: center;
            margin-top: 30px;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        
        .signup-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .signup-footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .signup-container {
                padding: 30px 20px;
            }
            
            .signup-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <span class="logo">🎤</span>
                <span class="brand-name">SpeakEasy AI</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="practice.html">Practice</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- Signup Section -->
    <section class="signup-section">
        <div class="signup-container">
            <div class="signup-header">
                <h1>Create Account</h1>
                <p>Start your English speaking journey</p>
            </div>

            <form class="signup-form" id="signupForm">
                <div id="errorMessage" style="display: none; background: #ffe0e0; color: #d32f2f; padding: 12px; border-radius: 8px; margin-bottom: 16px;"></div>
                <div id="successMessage" style="display: none; background: #e0ffe0; color: #2f7d2f; padding: 12px; border-radius: 8px; margin-bottom: 16px;"></div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Min 6 characters" required minlength="6">
                </div>

                <button type="submit" class="signup-btn">Sign Up</button>
            </form>

            <div class="signup-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </section>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // Initialize Supabase client
        const SUPABASE_URL = 'https://qiapbljkhbpybhqcshjo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_k514gfd5YtchDsftJjRqUw_w5uEBayH';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Check if user is already logged in
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        }
        checkAuth();
        
        // Signup form handler
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = this.querySelector('.signup-btn');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            // Hide any previous messages
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            // Validate inputs
            if (!email || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }
            
            submitBtn.textContent = 'Creating account...';
            submitBtn.disabled = true;
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });
                
                if (error) {
                    errorDiv.textContent = 'Signup failed: ' + error.message;
                    errorDiv.style.display = 'block';
                    submitBtn.textContent = 'Sign Up';
                    submitBtn.disabled = false;
                    return;
                }
                
                // Success - redirect to dashboard
                if (data.session) {
                    localStorage.setItem('sb_access_token', data.session.access_token);
                    successDiv.textContent = 'Account created! Redirecting to dashboard...';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else if (data.user) {
                    // User created but email confirmation might be required
                    successDiv.textContent = 'Account created! Please check your email to confirm your account, then login.';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    errorDiv.textContent = 'Unexpected response. Please try again.';
                    errorDiv.style.display = 'block';
                    submitBtn.textContent = 'Sign Up';
                    submitBtn.disabled = false;
                }
            } catch (err) {
                errorDiv.textContent = 'An error occurred: ' + err.message;
                errorDiv.style.display = 'block';
                submitBtn.textContent = 'Sign Up';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
